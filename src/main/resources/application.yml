spring:
  application:
    name: byz-gateway
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: "1"
      properties:
        max.block.ms: 1000
        linger.ms: 5
        retries: 1
    admin:
      fail-fast: false
  cloud:
    gateway:
      default-filters:
        # Backends also set CORS; without this the browser sees duplicate ACAO and blocks login.
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Expose-Headers Access-Control-Allow-Headers Access-Control-Allow-Methods Vary, RETAIN_FIRST
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: ${byz.gateway.rate-limit.replenish-rate:40}
            redis-rate-limiter.burstCapacity: ${byz.gateway.rate-limit.burst-capacity:80}
            key-resolver: "#{@byzKeyResolver}"
      # CORS: do NOT use spring.cloud.gateway.globalcors — it registers a CorsWebFilter
      # that returns 403 on failed preflight before our filters run. OPTIONS are handled
      # by OptionsCorsWebFilter; response ACAO is normalized by DedupeCorsGlobalFilter.
      routes:
        - id: iam
          uri: ${BYZ_IAM_URI:http://127.0.0.1:8082}
          predicates:
            - Path=/iam/**
          filters:
            - StripPrefix=1
        - id: notifications
          uri: ${BYZ_NOTIFICATIONS_URI:http://127.0.0.1:8081}
          predicates:
            - Path=/notifications/**
          filters:
            - StripPrefix=1
        - id: directory
          uri: ${BYZ_DIRECTORY_URI:http://127.0.0.1:8086}
          predicates:
            - Path=/directory/**
          filters:
            - StripPrefix=1
        - id: events
          uri: ${BYZ_EVENTS_URI:http://127.0.0.1:8088}
          predicates:
            - Path=/events/**
          filters:
            - StripPrefix=1
        - id: files
          uri: ${BYZ_FILES_URI:http://127.0.0.1:8089}
          predicates:
            - Path=/files/**
          filters:
            - StripPrefix=1

server:
  port: ${PORT:8096}

byz:
  gateway:
    rate-limit:
      replenish-rate: ${RATE_LIMIT_REPLENISH:40}
      burst-capacity: ${RATE_LIMIT_BURST:80}
  kafka:
    enabled: ${BYZ_KAFKA_ENABLED:true}
    topics:
      gateway-access: byz.gateway.access

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
  health:
    # Kafka is best-effort for access logs — do not mark the gateway DOWN if the broker is off.
    kafka:
      enabled: false

logging:
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","service":"byz-gateway","logger":"%logger{36}","msg":"%msg"}%n'
